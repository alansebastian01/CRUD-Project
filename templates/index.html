<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Management System</title>
</head>
<body>
<h1>Student Management System</h1>
<hr>
<h2>Add New Student</h2>
<form action="/add" method="POST">
<p><label>Name:</label><br><input type="text" name="name" required></p>
<p><label>Email:</label><br><input type="email" name="email" required></p>
<p><label>Course:</label><br><input type="text" name="course" required></p>
<p><input type="submit" value="Add Student"></p>
</form>
<hr>
<h2>Student List</h2>
<table border="1" cellpadding="8" cellspacing="0">
<tr><th>ID</th><th>Name</th><th>Email</th><th>Course</th><th>Actions</th></tr>
{% for student in students %}
<tr>
<td>{{ student[0] }}</td>
<td>{{ student[1] }}</td>
<td>{{ student[2] }}</td>
<td>{{ student[3] }}</td>
<td>
<a href="/edit/{{ student[0] }}">Edit</a> |
<a href="/delete/{{ student[0] }}" onclick="return confirm('Delete this student?');">Delete</a>
</td>
</tr>
{% endfor %}
</table>
</body>
</html>
